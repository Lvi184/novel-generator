# 叙事分析提示词
narrative_analysis: |
  请分析以下小说章节的叙事技法，输出 JSON 格式：
  
  分析维度：
  1. 剧情节奏（紧张度曲线）
  2. 钩子设计（章末悬念）
  3. 对话风格（对话占比、句式）
  4. 冲突模式（冲突类型、升级方式）
  5. 人物弧线（主角成长、关系变化）

# 叙事迁移提示词
narrative_migration: |
  请根据以下叙事技法档案和用户新想法，创作新故事：
  
  要求：
  1. 完全复用原作的叙事节奏和钩子设计
  2. 设定和人物根据用户新想法原创
  3. 保持古龙风格（对话占比高、短句、章末悬念）
